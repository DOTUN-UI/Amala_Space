<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - EchoSpace</title>
    <link rel="stylesheet" href="admin.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <!-- admin password -->
    <div id="password-gate">
      <h2>Admin Login</h2>
      <input type="password" id="password-input" placeholder="Enter password" />
      <button id="login-btn">Login</button>
      <p id="login-error"></p>
    </div>

    <!-- Create Post Form (hidden by default until admin logs in) -->
    <div id="admin-panel" style="display: none">
      <h2>Welcome Admin</h2>
      <div id="create-post-form">
        <div id="form-first-row">
          <div id="form-title">
            <label for="post-title">Title</label>
            <input type="text" id="post-title" placeholder="Enter post title" />
            <p class="field-error title-error"></p>
          </div>
          <div id="form-author">
            <label for="post-author">Author</label>
            <input
              type="text"
              id="post-author"
              placeholder="Enter author name" />
            <p class="field-error author-error"></p>
          </div>
          <div id="form-genre">
            <label for="post-genre">Genre</label>
            <select id="post-genre">
              <option value="" disabled selected>Select genre</option>
              <option value="sports">Sports</option>
              <option value="tech">Tech</option>
              <option value="entertainment">Entertainment</option>
              <option value="world news">World News</option>
            </select>
            <p class="field-error genre-error"></p>
          </div>
        </div>
        <div id="current-image-container"></div>
        <div id="form-image">
          <div>
            <label for="post-image">Image</label>
            <input type="file" id="post-image" />
          </div>
          <button id="upload-image-btn">Upload Image</button>
        </div>
        <p class="field-error image-error" style="text-align: left"></p>
        <div id="form-content">
          <label for="post-content">Content</label>
          <textarea
            id="post-content"
            rows="5"
            placeholder="Enter post content"></textarea>
          <p class="field-error content-error"></p>
        </div>
        <div id="form-submit-container">
          <button id="form-submit-post-btn">Create Post</button>
        </div>
      </div>
    </div>

    <script src="supabase.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
